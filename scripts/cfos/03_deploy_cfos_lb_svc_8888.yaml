apiVersion: v1
kind: Service
metadata:
  name: cfos7210250-service
  annotations:
    protectedClusterIPSVCName: go2web
    metallb.universe.tf/loadBalancerIPs: 10.0.0.4
    service.beta.kubernetes.io/azure-dns-label-name: k8strainingmaster1
spec:
  sessionAffinity: ClientIP
  ports:
  - port: 8080
    name: rest
    targetPort: 80
  - port: 8889
    name: cfos-goweb-1
    targetPort: 8889
    protocol: TCP
  - port: 8888
    name: cfos-coredns-1
    targetPort: 53
    protocol: UDP
  selector:
    app: cfos
  type: LoadBalancer
