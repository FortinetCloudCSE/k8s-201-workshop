---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-cfoscontrolleramd64alpha16
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cfoscontrolleramd64alpha16
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cfoscontrolleramd64alpha16
  template:
    metadata:
      labels:
        app: cfoscontrolleramd64alpha16
    spec:
      serviceAccountName: sa-cfoscontrolleramd64alpha16
      containers:
      - name: cfoscontrolleramd64alpha16
        image: interbeing/myfmg:cfoscontrolleramd64alpha16
        imagePullPolicy: Always
        env:
          - name: LOGLEVEL
            value: "info"
        envFrom:
          - configMapRef:
              name: cfoscontrollerenv
        volumeMounts:
        - name: config-volume
          mountPath: /etc/config
      volumes:
      - name: config-volume
        configMap:
          name: cfoscontrollerenv
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cfoscontrolleramd64alpha16-role
rules:
- apiGroups: ["apps", ""]
  resources: ["deployments", "namespaces", "serviceaccounts", "services", "configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["", "extensions", "networking.k8s.io"]
  resources: ["ingresses", "services", "endpoints", "pods", "nodes", "pods/log", "secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses/status"]
  verbs: ["get", "list", "watch", "update"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles", "rolebindings"]
  verbs: ["get", "list", "create", "update", "delete", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cfoscontrolleramd64alpha16-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cfoscontrolleramd64alpha16-role
subjects:
- kind: ServiceAccount
  name: sa-cfoscontrolleramd64alpha16
  namespace: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cfoscontrollerenv
data:   
  cfosContainerImage: "fortinetwandy.azurecr.io/cfos:255"
  cfosImagePullSecret: "cfosimagepullsecret"
  managedByController: "fortinetcfos"
  apiServicePort: "8080"
  CFOSLBSERVICENAME: "cfos7210250-service"
  cfosNameSpace: "cfostest"
